  <h2>Tokenization</h2>
  <div class="content">
    <div
      style="
        display: grid;
        grid-template-columns: 35% 65%;
        gap: 12px;
        height: 420px;
      "
    >
      <div style="display: flex; flex-direction: column; gap: 8px">
        <div class="callout-num" style="flex: 1; font-size: 2.4em">
          <span id="s2-count-tokens-1">0</span>
          <small>tokens in Shakespeare</small>
        </div>
        <div class="callout-num" style="flex: 1; font-size: 2.4em">
          <span id="s2-count-types-1">0</span>
          <small>unique token types</small>
        </div>
      </div>
      <div style="min-width: 0; position: relative">
        <canvas data-chart="doughnut" style="width: 100%; height: 100%">

<!-- 6. S2 — DEMO                                                       -->
<!-- ══════════════════════════════════════════════════════════════════ -->
<section id="s2-tokenizer-demo">
  <h2>Type Text, Watch Tokens</h2>
  <div class="content">
    <div class="tok-controls">
      <textarea
        id="tok-input"
        class="tok-textarea"
        oninput="runDemo2()"
        placeholder="Type something…"
      >
To be or not to be, that is the question</textarea
      >
      <div class="tok-presets">
        <button
          class="tok-preset-btn"
          onclick="setTokInput('To be or not to be, that is the question')"
        >
          Hamlet
        </button>
        <button
          class="tok-preset-btn"
          onclick="setTokInput('The quick brown fox jumps over the lazy dog')"
        >
          Pangram
        </button>
        <button
          class="tok-preset-btn"
          onclick="setTokInput('supercalifragilisticexpialidocious pizza')"
        >
          Unknown word
        </button>
        <button
          class="tok-preset-btn"
          onclick="Speakit.readText(document.getElementById('tok-input').value, 'en-US')"
        >
          &#128266; Speak
        </button>
      </div>
    </div>
    <div id="tok-tokens" class="tok-tokens"></div>
    <div class="tok-bottom">
      <div id="tok-ids" class="tok-ids"></div>
      <div id="tok-stats" class="tok-stats"></div>
    </div>
  </div>
</section>
