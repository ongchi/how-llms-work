<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>How LLMs Work</title>

    <!-- Reveal.js core + White theme -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/reset.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/reveal.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/theme/white.css"
    />

    <!-- Overpass font (Minimal 16:9 template) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Overpass:ital,wght@0,300;0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">

    <!-- Sigma.js + Graphology for network graph -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/graphology/0.25.4/graphology.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sigma.js/2.4.0/sigma.min.js"></script>

    <!-- Syntax highlighting — GitHub theme -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css"
    />

    <!-- Custom styles -->
    <link rel="stylesheet" href="revealjs-styles.css" />
  </head>
  <body>
    <div class="reveal">
      <div class="slides">
        <!-- ══════════════════════════════════════════════════════════════════ -->
        <!-- TITLE                                                              -->
        <!-- ══════════════════════════════════════════════════════════════════ -->
        <section id="s0-title" class="title-slide" data-external="slides/00-title.html"></section>

        <!-- ══════════════════════════════════════════════════════════════════ -->
        <!-- S1 — INTRODUCTION (vertical stack)                                 -->
        <!-- ══════════════════════════════════════════════════════════════════ -->
        <section data-external="slides/01-introduction.html"></section>

        <!-- ══════════════════════════════════════════════════════════════════ -->
        <!-- S2 — TOKENS (vertical stack)                                       -->
        <!-- ══════════════════════════════════════════════════════════════════ -->
        <section data-external="slides/02-tokens.html"></section>

        <!-- ══════════════════════════════════════════════════════════════════ -->
        <!-- S3 — EMBEDDINGS (vertical stack)                                   -->
        <!-- ══════════════════════════════════════════════════════════════════ -->
        <section data-external="slides/03-embeddings.html"></section>

        <!-- ══════════════════════════════════════════════════════════════════ -->
        <!-- S4 — ATTENTION (vertical stack)                                    -->
        <!-- ══════════════════════════════════════════════════════════════════ -->
        <section data-external="slides/04-attention.html"></section>

        <!-- ══════════════════════════════════════════════════════════════════ -->
        <!-- S5 — TRANSFORMER LOOP (vertical stack)                             -->
        <!-- ══════════════════════════════════════════════════════════════════ -->
        <section data-external="slides/05-transformer-loop.html"></section>

        <!-- ══════════════════════════════════════════════════════════════════ -->
        <!-- S6 — TRAINING                                                      -->
        <!-- ══════════════════════════════════════════════════════════════════ -->
        <section id="s6-training" data-external="slides/06-training.html"></section>

        <!-- ══════════════════════════════════════════════════════════════════ -->
        <!-- S7 — AI AGENTS (vertical stack)                                    -->
        <!-- ══════════════════════════════════════════════════════════════════ -->
        <section data-external="slides/07-agents.html"></section>

        <!-- ══════════════════════════════════════════════════════════════════ -->
        <!-- S8 — TIPS + S9 — MOMO (vertical)                                  -->
        <!-- ══════════════════════════════════════════════════════════════════ -->
        <section data-external="slides/08-tips.html"></section>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/speakit-js/src/Speakit1.0.2.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/countup.js@2.8.0/dist/countUp.umd.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2/dist/chartjs-plugin-datalabels.min.js"></script>
    <script src="js/chart-setup.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/rajgoel/reveal.js-plugins/chart/plugin.js"></script>
    <script src="js/external.js"></script>

    <!-- Reveal.js + highlight plugin (handles syntax highlighting + data-line-numbers) -->
    <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/reveal.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/plugin/highlight/highlight.js"></script>
    <script>
      Reveal.initialize({
        width: 1280,
        height: 720,
        margin: 0.04,
        controls: true,
        progress: true,
        slideNumber: "c/t",
        hash: true,
        transition: "slide",
        center: false,
        plugins: [RevealExternal, RevealHighlight, RevealChart],
      });
    </script>

    <!-- Runnable examples runtime -->
    <script defer src="js/demos.js"></script>
  </body>
</html>
